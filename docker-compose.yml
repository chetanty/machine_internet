version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: uaa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  api:
    build: .
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8001 --reload
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/uaa
    ports:
      - "8001:8001"
    volumes:
      - .:/app
      - schemas:/app/schemas
    depends_on:
      - db

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8001
    ports:
      - "3000:3000"
    depends_on:
      - api

volumes:
  pgdata:
  schemas:
