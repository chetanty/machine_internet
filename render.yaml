services:
  - type: web
    name: machine-internet
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /
    autoDeploy: true
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: RATE_LIMIT_ALLOWLIST
        sync: false

    # Uncomment to persist schemas discovered at runtime across deploys.
    # Without this, only schemas committed to git survive a redeploy.
    # disk:
    #   name: schemas
    #   mountPath: /app/schemas
    #   sizeGB: 1
